# ==============================================================================
# General settings
# ==============================================================================
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 50000
set -g mouse on
set -sg escape-time 10          # faster key sequences (important for vim)
set -g focus-events on

# Use C-a as prefix (like screen), or keep C-b — comment/uncomment as needed
# set -g prefix C-a
# unbind C-b
# bind C-a send-prefix

# ==============================================================================
# Vim-style key bindings
# ==============================================================================

# Pane navigation (vim hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing (vim-style with repeat)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Split panes (mnemonic: | for vertical, - for horizontal)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
# unbind '"'
# unbind %

# Window navigation
bind -r n next-window
bind -r p previous-window
bind -r C-h previous-window      # Ctrl+h / Ctrl+l for quick switching
bind -r C-l next-window

# ==============================================================================
# Copy mode — vi style
# ==============================================================================
setw -g mode-keys vi

# Enter copy mode with prefix + Escape (like Vim normal mode)
bind Escape copy-mode

# vi-style bindings inside copy mode
bind -T copy-mode-vi v   send -X begin-selection       # v   → start selection
bind -T copy-mode-vi V   send -X select-line            # V   → line selection
bind -T copy-mode-vi C-v send -X rectangle-toggle       # C-v → block selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel  # y → yank & exit
bind -T copy-mode-vi Y   send -X copy-line              # Y   → yank whole line

# Navigation in copy mode (same as vim)
bind -T copy-mode-vi h   send -X cursor-left
bind -T copy-mode-vi j   send -X cursor-down
bind -T copy-mode-vi k   send -X cursor-up
bind -T copy-mode-vi l   send -X cursor-right
bind -T copy-mode-vi w   send -X next-word
bind -T copy-mode-vi b   send -X previous-word
bind -T copy-mode-vi e   send -X next-word-end
bind -T copy-mode-vi ^   send -X back-to-indentation
bind -T copy-mode-vi 0   send -X start-of-line
bind -T copy-mode-vi $   send -X end-of-line
bind -T copy-mode-vi g   send -X history-top            # gg
bind -T copy-mode-vi G   send -X history-bottom
bind -T copy-mode-vi /   send -X search-forward         # / → forward search
bind -T copy-mode-vi ?   send -X search-backward        # ? → backward search
bind -T copy-mode-vi n   send -X search-again
bind -T copy-mode-vi N   send -X search-reverse
bind -T copy-mode-vi C-u send -X halfpage-up
bind -T copy-mode-vi C-d send -X halfpage-down
bind -T copy-mode-vi C-b send -X page-up
bind -T copy-mode-vi C-f send -X page-down
bind -T copy-mode-vi q   send -X cancel                 # q → exit copy mode

# Paste
bind p paste-buffer
bind P choose-buffer                                     # choose from buffer list

# ==============================================================================
# Clipboard integration (macOS pbcopy / WSL clip.exe / Linux xclip / xsel)
# ==============================================================================
if-shell "uname | grep -q Darwin" {
    # macOS
    bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
    bind -T copy-mode-vi Y send -X copy-pipe "pbcopy"
    bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
} {
    # WSL — detected via /proc/version containing "microsoft" (case-insensitive)
    if-shell "grep -qi microsoft /proc/version 2>/dev/null" {
        bind -T copy-mode-vi y send -X copy-pipe-and-cancel "clip.exe"
        bind -T copy-mode-vi Y send -X copy-pipe "clip.exe"
        bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "clip.exe"
    } {
        # Native Linux (prefer xclip, fall back to xsel)
        if-shell "command -v xclip > /dev/null" {
            bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -in -selection clipboard"
            bind -T copy-mode-vi Y send -X copy-pipe "xclip -in -selection clipboard"
            bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xclip -in -selection clipboard"
        } {
            bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xsel --clipboard --input"
            bind -T copy-mode-vi Y send -X copy-pipe "xsel --clipboard --input"
            bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xsel --clipboard --input"
        }
    }
}
