# ==============================================================================
# General settings
# ==============================================================================
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 50000
set -g mouse on
set -sg escape-time 100          # faster key sequences (important for vim)
set -g focus-events on
set -g extended-keys on
set -as terminal-features 'xterm-256color:extkeys'
set -g base-index 1
set -g pane-base-index 1

# Use C-a as prefix (like screen), or keep C-b — comment/uncomment as needed
# set -g prefix C-a
# unbind C-b
# bind C-a send-prefix

# ==============================================================================
# Vim-style key bindings
# ==============================================================================

# Pane navigation (vim hjkl) — vim-aware: forwards to vim when inside nvim
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"
bind h if-shell "$is_vim" 'send-keys C-M-h' 'select-pane -L'
bind j if-shell "$is_vim" 'send-keys C-M-j' 'select-pane -D'
bind k if-shell "$is_vim" 'send-keys C-M-k' 'select-pane -U'
bind l if-shell "$is_vim" 'send-keys C-M-l' 'select-pane -R'


# Split panes (mnemonic: | for vertical, - for horizontal)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
# unbind '"'
# unbind %

set -g repeat-time 2500
set -g renumber-windows on

# Window navigation
bind -r n next-window
bind -r p previous-window
bind -r C-n next-window
bind -r C-p previous-window
bind -r '{' previous-window
bind -r '}' next-window

# Pane selection by number
bind F1 select-pane -t :.1
bind F2 select-pane -t :.2
bind F3 select-pane -t :.3
bind F4 select-pane -t :.4
bind F5 select-pane -t :.5
bind F6 select-pane -t :.6
bind F7 select-pane -t :.7
bind F8 select-pane -t :.8

# Pane navigation with Ctrl+hjkl (prefix + Ctrl+h/j/k/l) — same vim-aware logic
bind C-h if-shell "$is_vim" 'send-keys C-M-h' 'select-pane -L'
bind C-j if-shell "$is_vim" 'send-keys C-M-j' 'select-pane -D'
bind C-k if-shell "$is_vim" 'send-keys C-M-k' 'select-pane -U'
bind C-l if-shell "$is_vim" 'send-keys C-M-l' 'select-pane -R'

# Force re-render: briefly split a 1-col pane that auto-closes,
# triggering two real pty resize events (shrink → restore)
bind b split-window -h -d -l 1 'sleep 0.1'

# Open panels based on current path
bind c new-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"  # 좌우 분할
bind '"' split-window -v -c "#{pane_current_path}"  # 상하 분할

# ==============================================================================
# Copy mode — vi style
# ==============================================================================
setw -g mode-keys vi

# Enter copy mode with prefix + Escape (like Vim normal mode)
# bind Escape copy-mode

# vi-style bindings inside copy mode
bind -T copy-mode-vi v   send -X begin-selection       # v   → start selection
bind -T copy-mode-vi V   send -X select-line            # V   → line selection
bind -T copy-mode-vi C-v send -X rectangle-toggle       # C-v → block selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel  # y → yank & exit
bind -T copy-mode-vi Y   send -X copy-line              # Y   → yank whole line

# Navigation in copy mode (same as vim)
bind -T copy-mode-vi h   send -X cursor-left
bind -T copy-mode-vi j   send -X cursor-down
bind -T copy-mode-vi k   send -X cursor-up
bind -T copy-mode-vi l   send -X cursor-right
bind -T copy-mode-vi w   send -X next-word
bind -T copy-mode-vi b   send -X previous-word
bind -T copy-mode-vi e   send -X next-word-end
bind -T copy-mode-vi ^   send -X back-to-indentation
bind -T copy-mode-vi 0   send -X start-of-line
bind -T copy-mode-vi $   send -X end-of-line
bind -T copy-mode-vi g   send -X history-top            # gg
bind -T copy-mode-vi G   send -X history-bottom
bind -T copy-mode-vi /   send -X search-forward         # / → forward search
bind -T copy-mode-vi ?   send -X search-backward        # ? → backward search
bind -T copy-mode-vi n   send -X search-again
bind -T copy-mode-vi N   send -X search-reverse
bind -T copy-mode-vi C-u send -X halfpage-up
bind -T copy-mode-vi C-d send -X halfpage-down
bind -T copy-mode-vi C-b send -X page-up
bind -T copy-mode-vi C-f send -X page-down
bind -T copy-mode-vi q   send -X cancel                 # q → exit copy mode

# Paste
bind p paste-buffer
bind P choose-buffer                                     # choose from buffer list

# ==============================================================================
# Clipboard integration (macOS pbcopy / WSL clip.exe / Linux xclip / xsel)
# ==============================================================================
if-shell "uname | grep -q Darwin" {
    # macOS
    bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
    bind -T copy-mode-vi Y send -X copy-pipe "pbcopy"
    bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
} {
    # WSL — detected via /proc/version containing "microsoft" (case-insensitive)
    if-shell "grep -qi microsoft /proc/version 2>/dev/null" {
        bind -T copy-mode-vi y send -X copy-pipe-and-cancel "clip.exe"
        bind -T copy-mode-vi Y send -X copy-pipe "clip.exe"
        bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "clip.exe"
    } {
        # Native Linux (prefer xclip, fall back to xsel)
        if-shell "command -v xclip > /dev/null" {
            bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -in -selection clipboard"
            bind -T copy-mode-vi Y send -X copy-pipe "xclip -in -selection clipboard"
            bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xclip -in -selection clipboard"
        } {
            bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xsel --clipboard --input"
            bind -T copy-mode-vi Y send -X copy-pipe "xsel --clipboard --input"
            bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xsel --clipboard --input"
        }
    }
}

# ==============================================================================
# Appearance — Powerline style · Active pane border highlight
# Nerd Font / Powerline 패치 폰트 필요 (화살표: \ue0b0 \ue0b2)
# ==============================================================================

# 이전에 설정된 window-style 명시적 초기화
set -g -u window-style
set -g -u window-active-style

# ── 패널 테두리 (tmux 3.2+) ──────────────────────────────────────────────────
set -g pane-border-lines        heavy          # 굵은 선 (┃ ━ ┏ ┓ ┗ ┛)
set -g pane-border-style        'fg=#252525'   # 비활성: 거의 안 보임 → 활성 LIME만 부각
set -g pane-active-border-style 'fg=#aaff00'   # 활성: LIME

# 테두리 상단에 패널 번호 + 실행 명령 표시 (1행 소모)
set -g pane-border-status top
set -g pane-border-format \
  '#{?pane_active,#[bold] #[fg=#ffffff]#P #[fg=#aaff00]#{pane_current_command}#[fg=#666666] #{pane_width}x#{pane_height} #[fg=#477bff]#{pane_current_path} , #[fg=#ffffff]#P #[fg=#888888]#{pane_current_command} #[fg=#666666]#{pane_current_path} }'
 
# ── 상태바 공통 ───────────────────────────────────────────────────────────────
set -g status          on
set -g status-position top
set -g status-interval 2
set -g status-style    'bg=#1a1a1a,fg=#c0c0c0'
set -g status-left-length  40
set -g status-right-length 40

# ── 상태바 왼쪽: 세션 이름  ──────────────────────────────────────────────────
# [green] #S []→[bar bg]
set -g status-left \
  ' #h  #[bg=#143ea8,fg=#ffffff,bold]  #S  #[bg=#1a1a1a,fg=#2e8b57,nobold]'

# ── 창 목록 (가운데) ──────────────────────────────────────────────────────────
#   비활성: 흐릿한 텍스트 / 활성: →[green] #I:#W [green]→
set -g window-status-separator      ''
set -g window-status-format         ' #[fg=#606060,bg=#313131] #I #[bg=#252525] #W '
set -g window-status-current-format \
  '#[fg=#2e8b57,bg=#1a1a1a] #[fg=#ffffff,bg=#2e8b57,bold] #I #[bg=#146746] #W #[fg=#2e8b57,bg=#1a1a1a,nobold]'

# ── 상태바 오른쪽: 날짜/시간 ─────────────────────────────────────────────────
#   [bar bg][green]→ 날짜·시간
set -g status-right \
  '#[fg=#2e8b57,bg=#1a1a1a]#[bg=#2e8b57,fg=#ffffff,bold] %Y-%m-%d  %H:%M '
