# ==============================================================================
# General settings
# ==============================================================================
set -g default-terminal "tmux-256color"
set -g history-limit 3000
set -g mouse on
set -sg escape-time 10           # minimal latency for key sequences (vim mode switch, prefix)
set -g focus-events on
set -g extended-keys on
set -as terminal-features ',xterm-256color:RGB:extkeys:usstyle:overline:clipboard'
set -g base-index 1
set -g pane-base-index 1

# macOS: tmux 서버 우선순위 올리기 (입력 지연 방지)
# sudoers 설정 없으면 GUI 비밀번호 팝업으로 폴백
if-shell "uname | grep -q Darwin" "run-shell 'SUDO_ASKPASS=~/.config/nvim/scripts/macos-askpass.sh sudo -A renice -n -5 -p #{pid} 2>/dev/null || true'"

# Use C-a as prefix (like screen), or keep C-b — comment/uncomment as needed
# set -g prefix C-a
# unbind C-b
# bind C-a send-prefix

# ==============================================================================
# Vim-style key bindings
# ==============================================================================

# Pane navigation (vim hjkl) — vim-aware: forwards to vim when inside nvim
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"
bind h if-shell "$is_vim" 'send-keys C-M-h' 'if -F "#{pane_at_left}"  "run \"~/.config/nvim/scripts/tmux-cross-window.sh right\"" "select-pane -L"'
bind j if-shell "$is_vim" 'send-keys C-M-j' 'select-pane -D'
bind k if-shell "$is_vim" 'send-keys C-M-k' 'select-pane -U'
bind l if-shell "$is_vim" 'send-keys C-M-l' 'if -F "#{pane_at_right}" "run \"~/.config/nvim/scripts/tmux-cross-window.sh left\""  "select-pane -R"'


# Split panes (mnemonic: | for vertical, - for horizontal)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
# unbind '"'
# unbind %

set -g repeat-time 2500
set -g renumber-windows on

# Window navigation
unbind n
unbind p
unbind C-n
unbind C-p
bind -r '{' previous-window
bind -r '}' next-window

# Pane selection by number
bind F1 select-pane -t :.1
bind F2 select-pane -t :.2
bind F3 select-pane -t :.3
bind F4 select-pane -t :.4
bind F5 select-pane -t :.5
bind F6 select-pane -t :.6
bind F7 select-pane -t :.7
bind F8 select-pane -t :.8

# Pane navigation with Ctrl+hjkl (prefix + Ctrl+h/j/k/l) — same vim-aware logic
bind -r C-h if-shell "$is_vim" 'send-keys C-M-h' 'if -F "#{pane_at_left}"  "run \"~/.config/nvim/scripts/tmux-cross-window.sh right\"" "select-pane -L"'
bind -r C-j if-shell "$is_vim" 'send-keys C-M-j' 'select-pane -D'
bind -r C-k if-shell "$is_vim" 'send-keys C-M-k' 'select-pane -U'
bind -r C-l if-shell "$is_vim" 'send-keys C-M-l' 'if -F "#{pane_at_right}" "run \"~/.config/nvim/scripts/tmux-cross-window.sh left\""  "select-pane -R"'

# Remove default arrow key pane navigation (redundant with hjkl bindings)
unbind Up
unbind Down
unbind Left
unbind Right

# Force re-render: briefly split a 1-col pane that auto-closes,
# triggering two real pty resize events (shrink → restore)
bind b split-window -h -d -l 1 'sleep 0.1'

# Close window (easier than &)
bind X confirm-before -p "kill-window #W? (y/n)" kill-window

# Open panels based on current path
bind c new-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"  # 좌우 분할
bind '"' split-window -v -c "#{pane_current_path}"  # 상하 분할

# ==============================================================================
# Copy mode — vi style
# ==============================================================================
setw -g mode-keys vi

# Enter copy mode with prefix + Escape (like Vim normal mode)
# bind Escape copy-mode

# vi-style bindings inside copy mode
bind -T copy-mode-vi v   send -X begin-selection       # v   → start selection
bind -T copy-mode-vi V   send -X select-line            # V   → line selection
bind -T copy-mode-vi C-v send -X rectangle-toggle       # C-v → block selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel  # y → yank & exit
bind -T copy-mode-vi Y   send -X copy-line              # Y   → yank whole line

# Navigation in copy mode (same as vim)
bind -T copy-mode-vi h   send -X cursor-left
bind -T copy-mode-vi j   send -X cursor-down
bind -T copy-mode-vi k   send -X cursor-up
bind -T copy-mode-vi l   send -X cursor-right
bind -T copy-mode-vi w   send -X next-word
bind -T copy-mode-vi b   send -X previous-word
bind -T copy-mode-vi e   send -X next-word-end
bind -T copy-mode-vi ^   send -X back-to-indentation
bind -T copy-mode-vi 0   send -X start-of-line
bind -T copy-mode-vi $   send -X end-of-line
bind -T copy-mode-vi g   send -X history-top            # gg
bind -T copy-mode-vi G   send -X history-bottom
bind -T copy-mode-vi / command-prompt -i -I "#{pane_search_string}" -T search -p "(search down)" { send-keys -X search-forward-incremental "%%%" }
bind -T copy-mode-vi ? command-prompt -i -I "#{pane_search_string}" -T search -p "(search up)" { send-keys -X search-backward-incremental "%%%" }
bind -T copy-mode-vi n   send -X search-again
bind -T copy-mode-vi N   send -X search-reverse
bind -T copy-mode-vi C-u send -X halfpage-up
bind -T copy-mode-vi C-d send -X halfpage-down
bind -T copy-mode-vi C-b send -X page-up
bind -T copy-mode-vi C-f send -X page-down
bind -T copy-mode-vi q       send -X cancel               # q       → exit copy mode
bind -T copy-mode-vi C-g     send -X cancel               # C-g     → exit copy mode (harmless BEL)
bind -T copy-mode-vi C-Space send -X cancel               # C-Space → exit copy mode

# Mouse ergonomics in copy mode
# - click anywhere → selection 취소 (네이티브 터미널과 동일한 느낌)
# - drag end      → selection 고정(stop)만, auto-copy 없음 (휠 스크롤에 selection 안 따라옴)
bind -T copy-mode-vi MouseDown1Pane    send-keys -X clear-selection
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X stop-selection

# Paste
bind p paste-buffer
bind P choose-buffer                                     # choose from buffer list

# ==============================================================================
# Clipboard integration (macOS pbcopy / WSL clip.exe / Linux xclip / xsel)
# ==============================================================================
if-shell "uname | grep -q Darwin" {
    # macOS
    bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
    bind -T copy-mode-vi Y send -X copy-pipe "pbcopy"

} {
    # WSL — detected via /proc/version containing "microsoft" (case-insensitive)
    if-shell "grep -qi microsoft /proc/version 2>/dev/null" {
        bind -T copy-mode-vi y send -X copy-pipe-and-cancel "clip.exe"
        bind -T copy-mode-vi Y send -X copy-pipe "clip.exe"
    
    } {
        # Native Linux (prefer xclip, fall back to xsel)
        if-shell "command -v xclip > /dev/null" {
            bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -in -selection clipboard"
            bind -T copy-mode-vi Y send -X copy-pipe "xclip -in -selection clipboard"
        
        } {
            bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xsel --clipboard --input"
            bind -T copy-mode-vi Y send -X copy-pipe "xsel --clipboard --input"
        
        }
    }
}

# ==============================================================================
# Appearance — Powerline style · Active pane border highlight
# Nerd Font / Powerline 패치 폰트 필요 (화살표: \ue0b0 \ue0b2)
# ==============================================================================

# 이전에 설정된 window-style 명시적 초기화
set -g window-style        'bg=#202020'   # 비활성 패널: 약간 밝은 배경
set -g window-active-style 'bg=#060606'   # 활성 패널: 터미널 기본 배경

# ── 패널 테두리 (tmux 3.2+) ──────────────────────────────────────────────────
set -g pane-border-lines        heavy          # 굵은 선 (┃ ━ ┏ ┓ ┗ ┛)
set -g pane-border-style        'fg=#252525'   # 비활성: 거의 안 보임 → 활성 LIME만 부각
set -g pane-active-border-style 'fg=#aaff00'   # 활성: LIME (copy mode 진입 시 훅으로 덮어씀)

# ── Copy mode: 빨간 경계선으로 강조 ──────────────────────────────────────────
# active pane의 모드가 바뀔 때만 처리 (다른 pane의 copy mode는 무시)
set-hook -g pane-mode-changed \
  'if -F "#{pane_active}" "if -F \"#{==:#{pane_mode},copy-mode}\" \"set -g pane-active-border-style fg=colour196\" \"set -g pane-active-border-style fg=#aaff00\""'
# 패널/윈도우 포커스 이동 시: 새로 포커스된 패널의 모드 확인 (pane·window 전환 모두 커버)
set-hook -g pane-focus-in \
  'if -F "#{==:#{pane_mode},copy-mode}" "set -g pane-active-border-style fg=colour196" "set -g pane-active-border-style fg=#aaff00"'

# 테두리 상단에 패널 번호 + 실행 명령 표시 (1행 소모)
set -g pane-border-status top
set -g pane-border-format \
  '#{?pane_active,#[bold] #[fg=#ffffff]#P #[fg=#aaff00]#{pane_current_command}#[fg=#666666] #{pane_width}x#{pane_height} #[fg=#477bff]#{pane_current_path} , #[fg=#ffffff]#P #[fg=#888888]#{pane_current_command} #[fg=#666666]#{pane_current_path} }'
 
# ── 상태바 공통 ───────────────────────────────────────────────────────────────
set -g status          on
set -g status-position top
set -g status-interval 1
set -g status-style    'bg=#1a1a1a,fg=#c0c0c0'
set -g status-left-length  55
set -g status-right-length 40

# ── 상태바 왼쪽: 세션 이름  ──────────────────────────────────────────────────
# [green] #S []→[bar bg]
set -g status-left \
  '#{?client_prefix,#[bg=#8b0000 fg=#ffcccc bold]  PREFIX  #[bg=#1a1a1a fg=#8b0000 nobold],} #h  #{?client_prefix,#[bg=#8b0000 fg=#ffffff bold],#[bg=#143ea8 fg=#ffffff bold]}  #S  #{?client_prefix,#[bg=#1a1a1a fg=#8b0000 nobold],#[bg=#1a1a1a fg=#2e8b57 nobold]}'

# ── 창 목록 (가운데) ──────────────────────────────────────────────────────────
#   비활성: 흐릿한 텍스트 / 활성: →[green] #I:#W [green]→
set -g window-status-separator      ''
set -g window-status-format         ' #{?client_prefix,#[fg=#606060 bg=#3d0000],#[fg=#606060 bg=#313131]} #I #{?client_prefix,#[bg=#2a0000],#[bg=#252525]} #{?#{==:#W,#{pane_current_command}},#{?client_prefix,#[fg=#aa8800],#[fg=#998a00]}#W#[fg=#606060],#W #{?client_prefix,#[fg=#aa8800],#[fg=#998a00]}(#{pane_current_command})#[fg=#606060]}#[fg=#ff0000]#(~/.config/nvim/scripts/tmux-claude-indicator.sh "#S:#I")#[fg=#606060] '
set -g window-status-current-format \
  '#{?client_prefix,#[fg=#cc0000 bg=#1a1a1a],#[fg=#2e8b57 bg=#1a1a1a]} #{?client_prefix,#[fg=#ffffff bg=#8b0000 bold],#[fg=#ffffff bg=#2e8b57 bold]} #I #{?client_prefix,#[bg=#600000],#[bg=#146746]} #{?#{==:#W,#{pane_current_command}},#[fg=#ffe066]#W#[fg=#ffffff],#W #[fg=#ffe066](#{pane_current_command})#[fg=#ffffff]}#[fg=#ff0000]#(~/.config/nvim/scripts/tmux-claude-indicator.sh "#S:#I")#[fg=#ffffff] #{?client_prefix,#[fg=#cc0000 bg=#1a1a1a nobold],#[fg=#2e8b57 bg=#1a1a1a nobold]}'

# ── 상태바 오른쪽: 날짜/시간 ─────────────────────────────────────────────────
#   [bar bg][green]→ 날짜·시간
set -g status-right \
  '#{?client_prefix,#[fg=#8b0000 bg=#1a1a1a]#[bg=#8b0000 fg=#ffcccc bold],#[fg=#2e8b57 bg=#1a1a1a]#[bg=#2e8b57 fg=#ffffff bold]} %Y-%m-%d  %H:%M '

# ==============================================================================
# Popup windows (tmux 3.2+)
# ==============================================================================
bind g display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "lazygit"
bind T display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "btop"
bind S display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "$SHELL"
bind e display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "nvim ."
bind E display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "EDITOR=nvim lf"

# ==============================================================================
# Nested tmux (SSH) — F12로 로컬 prefix 토글
# ==============================================================================
# F12: 로컬 키 비활성 → 모든 키가 원격 tmux로 전달
# 상태바가 어두워져서 현재 모드를 시각적으로 구분 가능
bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  set status-style 'bg=#3a3a3a,fg=#606060' \;\
  set window-status-current-format '#[fg=#888888,bg=#3a3a3a] #I:#W ' \;\
  set status-left '#[bg=#804000,fg=#ffffff,bold]  REMOTE  #[bg=#3a3a3a,fg=#804000]' \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S

# F12 다시: 로컬 키 복원
bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  set -u window-status-current-format \;\
  set -u status-left \;\
  refresh-client -S

# ==============================================================================
# Plugins (TPM)
# ==============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'

# resurrect: pane 내용, vim 세션 등 복원
set -g @resurrect-capture-pane-contents 'on'

# continuum: 15분마다 자동 저장, tmux 시작 시 자동 복원
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# tmux-fzf: prefix+: → Command fzf (기본 command-prompt 대체)
bind : run-shell -b '~/.config/nvim/scripts/tmux-fzf-command.sh'

# TPM 초기화 — 없으면 자동 설치 후 플러그인까지 설치
if "test ! -d ~/.tmux/plugins/tpm" \
  "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
run '~/.tmux/plugins/tpm/tpm'
