"$schema" = 'https://starship.rs/config-schema.json'

# ── Prompt layout ─────────────────────────────────────────────────────────────
# 첫 번째 줄: 경로 / git / 언어 / 상태
# 두 번째 줄: 입력 커서
format = """
$directory\
$git_branch\
$git_status\
$git_state\
$nodejs\
$python\
$rust\
$golang\
$java\
$lua\
$docker_context\
$cmd_duration\
$jobs\
$time\
$line_break\
$character"""

# ── Directory ────────────────────────────────────────────────────────────────
[directory]
style             = "bold green"
truncation_length = 0       # 전체 경로 표시
truncate_to_repo  = false
format            = "[$path]($style)[$read_only]($read_only_style) "

# ── Git ──────────────────────────────────────────────────────────────────────
[git_branch]
format = "on [$symbol$branch]($style) "
style  = "bold purple"
symbol = " "

[git_status]
format    = "([$all_status$ahead_behind]($style) )"
style     = "bold red"
ahead     = "⇡${count}"
behind    = "⇣${count}"
diverged  = "⇕⇡${ahead_count}⇣${behind_count}"
staged    = "[+${count}](green)"
modified  = "[!${count}](yellow)"
untracked = "[?${count}](blue)"
deleted   = "[-${count}](red)"
stashed   = "[≡](cyan)"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style  = "bold yellow"

# ── Languages (auto-detected by files in CWD) ────────────────────────────────
[nodejs]
format = "via [$symbol($version )]($style)"
symbol = " "
style  = "bold green"

[python]
format = "via [$symbol($version )($virtualenv )]($style)"
symbol = " "
style  = "bold yellow"

[rust]
format = "via [$symbol($version )]($style)"
symbol = " "
style  = "bold red"

[golang]
format = "via [$symbol($version )]($style)"
symbol = " "
style  = "bold cyan"

[java]
format = "via [$symbol($version )]($style)"
symbol = " "
style  = "bold red"

[lua]
format = "via [$symbol($version )]($style)"
symbol = " "
style  = "bold blue"

# ── Docker ───────────────────────────────────────────────────────────────────
[docker_context]
format = "via [$symbol$context]($style) "
symbol = " "
style  = "blue bold"

# ── Command duration ─────────────────────────────────────────────────────────
[cmd_duration]
min_time           = 2_000   # 2초 이상 걸린 명령어에 표시
format             = "took [$duration]($style) "
style              = "bold yellow"
show_milliseconds  = false

# ── Background jobs ──────────────────────────────────────────────────────────
[jobs]
format  = "[$symbol$number]($style) "
symbol  = "✦"
style   = "bold blue"
number_threshold = 1

# ── Time ─────────────────────────────────────────────────────────────────────
[time]
disabled      = false
format        = "\\[[$time]($style)\\] "
style         = "bold dimmed white"
time_format   = "%H:%M"

# ── Prompt character ─────────────────────────────────────────────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold yellow)"   # vim 모드일 때 (zsh vi-mode 연동)
