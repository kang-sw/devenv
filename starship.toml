"$schema" = 'https://starship.rs/config-schema.json'

format = """$cmd_duration\
[░▒▓](#a3aed2)\
[  ](bg:#a3aed2 fg:#090c0c)\
[](bg:#171f26 fg:#a3aed2)\
$directory\
[](fg:#171f26 bg:#394260)\
$git_branch\
$git_status\
[](fg:#394260 bg:#212736)\
$nodejs\
$rust\
$golang\
$php\
[](fg:#212736 bg:#1d2230)\
$time\
[ ](fg:#1d2230)\
\n$character"""


[directory]
style = "fg:#ffffff bg:#171f26"
format = "[$path ]($style)"
truncation_length = 6
truncation_symbol = '../'
truncate_to_repo = false
repo_root_style = "fg:#ffffff bg:#171f26 bold"
before_repo_root_style = "fg:#888888 bg:#171f26"
repo_root_format = '[ $before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style)'

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = ""
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#bbbbbb bg:#394260)]($style)'

[git_status]
style = "bg:#394260 bold"
format = '[[($all_status$ahead_behind)](fg:#ffffff bg:#394260)]($style)'

[nodejs]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#bbbbbb bg:#212736)]($style)'

[rust]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#bbbbbb bg:#212736)]($style)'

[golang]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#bbbbbb bg:#212736)]($style)'

[php]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#bbbbbb bg:#212736)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[  $time ](fg:#a0a9cb bg:#1d2230)]($style)'

[cmd_duration]
min_time = 2_000
format = "  finished in [$duration\n]($style) "
style = "bold yellow"
show_milliseconds = false
